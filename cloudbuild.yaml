steps:
  - name: 'python:3.12-slim'
    id: 'test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -e ".[dev]"
        ruff check src tests
        pytest -v

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/curator/curator:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/curator/curator:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-sha'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/curator/curator:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/curator/curator:latest']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
